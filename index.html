<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler</title>

<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Code -->
<!-- Lua(Fengari) -->
<script src="https://unpkg.com/fengari-web/dist/fengari-web.js"></script>
<!-- Ruby(opal) -->
<script src="https://cdn.opalrb.com/opal/current/opal.js"></script>
<script src="https://cdn.opalrb.com/opal/current/opal-parser.js"></script>
<!-- Type Script -->
<script src="https://cdn.jsdelivr.net/npm/typescript@latest/lib/typescript.js"></script>
<!-- Mark Down -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>

<!-- Language support -->
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-typescript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-lua.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-ruby.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup.min.js"></script>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="bad.css">
<link rel="stylesheet" href="good.css">
<link rel="stylesheet" href="other.css">

<!-- TailwindCSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<body
    x-data="Writing()"
    :data-theme="theme"
    class="bg-gray-900 text-gray-100 h-screen flex items-center justify-center p-6"
>
    
  <div class="w-full max-w-4xl flex flex-col gap-4 bg-gray-800 p-6 rounded-2xl shadow-2xl">
    <div class="text-center my-6" style="font-size: 6rem;">💻</div>
    <div class="text-center my-6" style="font-size: 6rem;"> </div>
 
    <!-- Header -->
    <h1 class="text-3xl font-bold text-white text-center mb-4 border-b border-gray-700 pb-2">
      CYD-N Online Compiler
    </h1>

    <select x-model="lan" @change="LanChange()"
              class="flex-1 p-2 bg-gray-700 text-gray-100 rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="Js">JavaScript</option>
        <option value="Ts">TypeScript</option>
        <option value="Lua">Lua</option>
        <option value="Rb">Ruby</option>
        <option value="Md">Markdown</option>
      </select>

    <!-- Language Selector and Download -->
    <div class="flex gap-4 items-center mb-4">
      <input x-model="name" placeholder="Name....."
              class="flex-1 p-2 bg-gray-700 text-gray-100 rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">

      <button @click="Download()"
              class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition-all duration-200">
        Download
      </button>
    </div>

    <!-- Theme Switcher -->
    <div class="faction-toggle">
        <div class="toggle-track">

            <div class="toggle-thumb"
                :class="theme"
            ></div>

            <button @click="theme = 'good'">
                Good Guy
            </button>

            <button @click="theme = 'bad'">
                Bad Guy
            </button>

            <button @click="theme = 'other'">
                Other Guy
            </button>

        </div>
    </div>

    <!-- Code Editor -->
   <div class="editor w-full " style="font: 14px/1.5 'Fira Code', monospace;">

        <pre
            x-ref="pre"
            aria-hidden="true"
            class="absolute inset-0 m-0 p-0 overflow-auto whitespace-pre-wrap break-words pointer-events-none rounded-lg"
            style="font: inherit; margin: 0; padding: 16px; box-sizing: border-box;"
        ><code x-ref="codeBlock" :class="'language-' + prismLang"></code></pre>

        <textarea
            x-model="code"
            @input="GetHighlight()"
            @scroll="$refs.pre.scrollTop = $event.target.scrollTop; $refs.pre.scrollLeft = $event.target.scrollLeft;"
            spellcheck="false"
            class="absolute inset-0 w-full h-full
                bg-transparent text-transparent caret-white
                border border-gray-700 rounded-lg
                resize-none overflow-auto outline-none"
            style="font: inherit; margin: 0; padding: 16px; box-sizing: border-box;"  
            x-init="GetHighlight()"
        ></textarea>

    </div>

    <!-- Run Button -->
    <button @click="Run()"
            class="self-end bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition-all duration-200">
      Run
    </button>

    <!-- Output Box (JS/Lua/Ruby) -->
    <div x-show="lan != 'Md'" class="w-full" >
      <pre x-text="result"
           class="w-full h-96 p-4 bg-gray-900 border border-gray-700 rounded-lg font-mono text-green-400 overflow-auto shadow-inner"></pre>
    </div>

    <!-- Output Box (Markdown) -->
    <div x-show="lan == 'Md'" class="w-full">
      <div x-html="result"
           class="w-full h-96 p-4 bg-gray-900 border border-gray-700 rounded-lg overflow-auto shadow-inner prose prose-invert"></div>
    </div>

  </div>
</body>

<script>
function Writing() {
    return{
        lan: "Js",
        prismLang: "javascript",
        code: 'console.log("Hello world")',
        theme: "good",
        result: "",
        name: "",
        logs: [],
        count: 10,
        tokens: {
            keyword: /\b(break|case|catch|class|const|continue|debugger|default|delete|do|else|export|extends|finally|for|function|if|import|in|instanceof|let|new|of|return|static|super|switch|this|throw|try|typeof|var|void|while|with|yield|async|await)\b/g,
            string: /(["'`])(?:\\[\s\S]|(?!\1)[^\\])*\1/g,
            number: /\b(\d+\.?\d*(?:e[+-]?\d+)?|0x[\da-f]+|0o[0-7]+|0b[01]+)\b/gi,
            comment: /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)/g,
            function: /\b([a-zA-Z_$][\w$]*)\s*(?=\()/g,
            type: /\b(Array|Boolean|Date|Error|Function|Map|Math|Number|Object|Promise|Proxy|RegExp|Set|String|Symbol|WeakMap|WeakSet|Int8Array|Uint8Array|Float32Array|Float64Array)\b/g,
            operator: /(\+\+|--|&&|\|\||[+\-*/%&|^~!<>=?:]=?|=>)/g,
            parameter: /(?<=function[\s\w$]*\(|(?:[\w$]+|\))\s*=>\s*\(?)[\s,]*([a-zA-Z_$][\w$]*)/g,
            property: /(?<=\.)\s*([a-zA-Z_$][\w$]*)\b(?!\s*\()/g,
            punctuation: /([{}[\]();,.])/g,
            decorator: /(@[a-zA-Z_$][\w$]*)/g,
            builtin: /\b(console|window|document|globalThis|process|module|exports|require|undefined|null|true|false|NaN|Infinity|arguments)\b/g,
            regex: /(?<![)\w$\]'"`])(\/((?![*+?])(?:[^/\\\n[]|\\.|\[(?:[^\]\\]|\\.)*])+)\/[gimsuy]*)/g,
        },

        GetHighlight() {
            this.$refs.codeBlock.textContent = this.code + "\n"; // 👈 important!
            Prism.highlightElement(this.$refs.codeBlock);
        },

        async Run(){
            this.logs = [];
            if(this.lan != "Md"){
                let originalConsole = console.log;
                console.log = (...args) => this.logs.push(args.join(''));

                // Run the code
                // Lisp, 
                if(this.lan == 'Js'){
                    eval(this.code);
                }
                else if(this.lan == "Lua"){
                    fengari.load(this.code)({print: console.log });
                }
                else if(this.lan == "Rb"){
                    Opal.eval(this.code);
                }
                else if(this.lan == "Ts"){
                const jsCode = ts.transpileModule(this.code, {compilerOptions: {module: ts.ModuleKind.ESNext}}).outputText;
                eval(jsCode);
                }
        
                // Display logs in the output box
                this.result = this.logs.join('\n');
                console.log(originalConsole);
            }
            else if(this.lan == "Md"){
                this.result = marked.parse(this.code);
            }
        },
    
        Download(){
            var file = new Blob([this.code], {type: this.lan.toLowerCase()});
            var a = document.createElement("a"),
                url = URL.createObjectURL(file);
            a.href = url;
            if(this.name.trim() == '')
                this.name = "File";

            a.download = this.name + "." + this.lan.toLowerCase();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);  
        },

        async LanChange(){
            await this.SwitchLan();
            this.GetHighlight();
        },

        SwitchLan(){
            switch(this.lan){
                case "Js": 
                    this.prismLang = "javascript";
                    this.code ='console.log("Hello from Jave Script!")';
                    this.GetHighlight();
                    break;
                case "Ts": 
                    this.prismLang = "typescript";
                    this.code ='const message: string = "Hello from Type Script!";\nconsole.log(message);';
                    break;
                case "Lua": 
                    this.prismLang = "lua";
                    this.code ='print("Hello from Lua!")';
                    break;
                case "Rb": 
                    this.prismLang = "ruby";
                    this.code ='puts "Hello from Ruby!";';
                    break;
                case "Md": 
                    this.prismLang = "markup";
                    this.code ='# Hello Markdown\n- This is a **Markdown** editor\n- Live preview in the browser\n- Works with lists, **bold**, *italic*, \`code\`, and more`';
                    break;
            }
        },
    }
}
</script>
</html>
