<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler</title>

<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Code -->
<!-- Lua(Fengari) -->
<script src="https://unpkg.com/fengari-web/dist/fengari-web.js"></script>
<!-- Ruby(opal) -->
<script src="https://cdn.opalrb.com/opal/current/opal.js"></script>
<script src="https://cdn.opalrb.com/opal/current/opal-parser.js"></script>
<!-- Type Script -->
<script src="https://cdn.jsdelivr.net/npm/typescript@latest/lib/typescript.js"></script>
<!-- Mark Down -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- TailwindCSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-gray-900 text-gray-100 h-screen flex items-center justify-center p-6" x-data="Writing()">
  <div class="w-full max-w-4xl flex flex-col gap-4 bg-gray-800 p-6 rounded-2xl shadow-2xl">
    <div class="text-center my-6" style="font-size: 6rem;">💻</div>
 
    <!-- Header -->
    <h1 class="text-3xl font-bold text-white text-center mb-4 border-b border-gray-700 pb-2">
      QR'S Online Compiler
    </h1>

    <select x-model="lan" @change="LanChange()"
              class="flex-1 p-2 bg-gray-700 text-gray-100 rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="Js">JavaScript</option>
        <option value="Ts">TypeScript</option>
        <option value="Lua">Lua</option>
        <option value="Rb">Ruby</option>
        <option value="Md">Markdown</option>
      </select>

    <!-- Language Selector and Download -->
    <div class="flex gap-4 items-center mb-4">
      <input x-model="name" placeholder="Name....."
              class="flex-1 p-2 bg-gray-700 text-gray-100 rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">

      <button @click="Download()"
              class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition-all duration-200">
        Download
      </button>
    </div>

    <!-- Code Editor -->
    <textarea x-model="code"
              class="w-full h-60 p-4 bg-gray-900 border border-gray-700 rounded-lg font-mono text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none shadow-lg"
              placeholder="Write your code here..."></textarea>

    <!-- Run Button -->
    <button @click="Run()"
            class="self-end bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition-all duration-200">
      Run
    </button>

    <!-- Output Box (JS/Lua/Ruby) -->
    <div x-show="lan != 'Md'" class="w-full">
      <pre x-text="result"
           class="w-full h-96 p-4 bg-gray-900 border border-gray-700 rounded-lg font-mono text-green-400 overflow-auto shadow-inner"></pre>
    </div>

    <!-- Output Box (Markdown) -->
    <div x-show="lan == 'Md'" class="w-full">
      <div x-html="result"
           class="w-full h-96 p-4 bg-gray-900 border border-gray-700 rounded-lg overflow-auto shadow-inner prose prose-invert"></div>
    </div>

  </div>
</body>



<script>
function Writing() {
    return{
        lan: "Js",
        code: 'console.log("Hello world")',
        result: "",
        name: "",
        logs: [],
        count: 10,

        async Run(){
            this.logs = [];
            if(this.lan != "Md"){
                let originalConsole = console.log;
                console.log = (...args) => this.logs.push(args.join(''));

                // Run the code
                // Lisp, 
                if(this.lan == 'Js'){
                    eval(this.code);
                }
                else if(this.lan == "Lua"){
                    fengari.load(this.code)({print: console.log });
                }
                else if(this.lan == "Rb"){
                    Opal.eval(this.code);
                }
                else if(this.lan == "Ts"){
                const jsCode = ts.transpileModule(this.code, {compilerOptions: {module: ts.ModuleKind.ESNext}}).outputText;
                eval(jsCode);
                }
        
                // Display logs in the output box
                this.result = this.logs.join('\n');
                console.log(originalConsole);
            }
            else if(this.lan == "Md"){
                this.result = marked.parse(this.code);
            }
        },
    
        Download(){
             var file = new Blob([this.code], {type: this.lan.toLowerCase()});
             var a = document.createElement("a"),
                url = URL.createObjectURL(file);
            a.href = url;
            if(this.name.trim() == '')
                this.name = "File";

            a.download = this.name + "." + this.lan.toLowerCase();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);  
        },

        LanChange(){
            switch(this.lan){
                case "Js": 
                    this.code ='console.log("Hello from Jave Script!")';
                    break;
                case "Ts": 
                    this.code ='const message: string = "Hello from Type Script!";\nconsole.log(message);';
                    break;
                case "Lua": 
                    this.code ='print("Hello from Lua!")';
                    break;
                case "Rb": 
                    this.code ='puts "Hello from Ruby!";';
                    break;
                case "Md": 
                    this.code ='# Hello Markdown\n- This is a **Markdown** editor\n- Live preview in the browser\n- Works with lists, **bold**, *italic*, \`code\`, and more`';
                    break;
            }
        }
    }
}
</script>
</html>
